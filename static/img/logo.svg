<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ls-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7A7EF5"/>
      <stop offset="100%" stop-color="#4347EA"/>
    </linearGradient>
  </defs>

  <!-- rounded square base -->
  <rect x="10" y="10" width="180" height="180" rx="40" fill="url(#ls-grad)"/>

  <!-- open book shape -->
  <path d="M100 62
           C 84 50, 58 48, 42 54
           L 42 138
           C 58 132, 84 134, 100 146
           C 116 134, 142 132, 158 138
           L 158 54
           C 142 48, 116 50, 100 62 Z"
        fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- spine -->
  <line x1="100" y1="62" x2="100" y2="146" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>

  <!-- code bracket accents on right page -->
  <path d="M116 84 L108 92 L116 100" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <path d="M140 84 L148 92 L140 100" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <line x1="122" y1="102" x2="134" y2="80" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
</svg>